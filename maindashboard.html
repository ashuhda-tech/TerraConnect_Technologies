<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Painel Hela</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1115;
            --sidebar-bg: #070b14;
            --card-bg: #1a1c20; 
            --accent: #d1b38b;
            --text: #f4e9d8;
            --border: #2d3139;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; }
        .sidebar { width: 260px; height: 100vh; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 30px 20px; position: fixed; box-sizing: border-box; }
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 25px; text-align: center; }
        .value { font-size: 2.5rem; font-weight: bold; color: var(--accent); display: block; margin: 15px 0; }
        .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 40px; }
        .btn-exit { background: transparent; border: 1px solid #ef4e4e; color: #ef4e4e; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 50px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color: var(--accent); margin-bottom: 5px;">TERRACONNECT</h2>
    <div style="background: #111827; padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-top: 20px;">
        <p style="font-size: 0.8rem; color: #9ca3af;">Usuário:</p>
        <p id="nav-user" style="font-weight: bold; margin: 5px 0;"></p>
        <p id="nav-id" style="font-size: 0.6rem; color: var(--accent); word-break: break-all;"></p>
    </div>
    <button class="btn-exit" onclick="logout()">Sair</button>
</div>

<div class="main-content">
    <header>
        <h1>Painel de Controle</h1>
        <p style="color: #9ca3af;">Hela's Smarthouse | Monitoramento Real-Time</p>
    </header>

    <div class="grid">
        <div class="card">
            <i class="fas fa-thermometer-half fa-2x"></i>
            <p>Temperatura</p>
            <span id="temp-val" class="value">--°C</span>
        </div>
        <div class="card">
            <i class="fas fa-tint fa-2x"></i>
            <p>Umidade</p>
            <span id="humi-val" class="value">--%</span>
        </div>
        <div class="card">
            <i class="fas fa-leaf fa-2x"></i>
            <p>Bio Data (CO2)</p>
            <span id="bio-val" class="value">--</span>
        </div>
    </div>

    <div class="chart-box">
        <h3>Histórico Recente</h3>
        <canvas id="mainChart" height="100"></canvas>
    </div>
</div>

<script>
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user || !user.channelId) { window.location.href = 'index.html'; }

    // Preenche dados da sidebar
    document.getElementById('nav-user').innerText = user.name;
    document.getElementById('nav-id').innerText = `ID: ${user.id}`;

    // Configuração da URL do ThingSpeak
    const TS_URL = `https://api.thingspeak.com/channels/${user.channelId}/feeds.json?api_key=${user.apiKey}&results=15`;

    // Inicialização do Gráfico
    const ctx = document.getElementById('mainChart').getContext('2d');
    const mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Temperatura (°C)',
                data: [],
                borderColor: '#d1b38b',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(209, 179, 139, 0.1)'
            }]
        }
    });

    async function fetchData() {
        try {
            const response = await fetch(TS_URL);
            const data = await response.json();
            if (data.feeds && data.feeds.length > 0) {
                const last = data.feeds[data.feeds.length - 1];
                
                // Atualiza Interface
                document.getElementById('temp-val').innerText = `${last.field1 || 0}°C`;
                document.getElementById('humi-val').innerText = `${last.field2 || 0}%`;
                document.getElementById('bio-val').innerText = last.field3 || 0;

                // Atualiza Gráfico
                mainChart.data.labels = data.feeds.map(f => new Date(f.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}));
                mainChart.data.datasets[0].data = data.feeds.map(f => f.field1);
                mainChart.update();
            }
        } catch (e) {
            console.error("Erro na busca do ThingSpeak:", e);
        }
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }

    // Inicia e agenda atualizações (20s)
    fetchData();
    setInterval(fetchData, 20000);
</script>
</body>
</html>
