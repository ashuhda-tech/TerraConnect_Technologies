<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #1a1c20;
            --card-bg: #070b14;
            --accent: #d1b38b;
            --text: #f4e9d8;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dashboard-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: var(--accent); margin-bottom: 10px; }
        .user-id { font-family: monospace; background: #111827; padding: 10px; border-radius: 5px; font-size: 0.8rem; margin: 20px 0; display: block; border: 1px solid #2d3139; }
        .btn-logout {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="dashboard-card">
    <i class="fas fa-user-circle fa-4x" style="color: var(--accent); margin-bottom: 20px;"></i>
    <h1>Bem-vindo, <span id="userName">Usuário</span>!</h1>
    <p>Seu registro no portal TerraConnect foi localizado.</p>
    
    <div class="user-id">
        <strong>USER_ID:</strong> <span id="userIdDisplay">Validando dados...</span>
    </div>

    <p id="statusMsg" style="font-size: 0.9rem; color: #9ca3af;">Verificando conexão com sensores...</p>
    
    <button class="btn-logout" onclick="logout()">Sair do Portal</button>
</div>

<script>
    // 1. GESTÃO DE SESSÃO
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) { 
        window.location.href = 'index.html'; 
    } else {
        // Correção dos nomes para bater com o HTML acima
        document.getElementById('userName').innerText = user.name || "Usuário";
        document.getElementById('userIdDisplay').innerText = user.id || "---";

        // 2. LÓGICA DE REDIRECIONAMENTO
        setTimeout(() => {
            if (user.channelId && user.apiKey) {
                document.getElementById('statusMsg').innerText = "Sensores localizados! Entrando no painel...";
                document.getElementById('statusMsg').style.color = "#48bb3a";
                
                // Redireciona para o painel principal após 2 segundos
                setTimeout(() => { window.location.href = 'maindashboard.html'; }, 2000);
            } else {
                document.getElementById('statusMsg').innerHTML = 
                    '<span style="color: #ef4e4e;">Erro: ChannelID ou API Key não encontrados no Excel para este usuário.</span>';
            }
        }, 1500);
    }

    function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
