<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0d1117;
            --accent: #d1b38b; 
            --text-light: #f4e9d8;
            --gray-panel: #1e1e1e;
            --border: #2d3139;
        }

        body {background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif;margin: 0; display: flex; height: 100vh; overflow: hidden;}

        .a70-font {font-family: 'Cinzel', serif; letter-spacing: 1px;}

        /* BARRA LATERAL */
        .sidebar {width: 300px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;}
        .nav-section {flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;}

        /* Estilo dos Cards de Ambiente */
        .ambient-card {background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 12px 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: all 0.3s; text-decoration: none; color: var(--text-light); font-size: 0.85rem;}
        .ambient-card i {font-size: 1.1rem; color: var(--accent); width: 20px; text-align: center;}
        .ambient-card:hover {background: var(--accent); color: var(--bg-dark); transform: translateX(5px);}
        .ambient-card:hover i { color: var(--bg-dark); }

/* Card Especial: ADICIONAR NOVO */
        .add-card {border: 1px dashed var(--accent); background: transparent; opacity: 0.6; margin-top: 10px;}
        .add-card:hover {opacity: 1; background: rgba(209, 179, 139, 0.1);= color: var(--accent); border-style: solid;}
        
        /* BRANDING */
        .brand-logo { text-align: center; margin: 25px 0; border-top: 1px solid var(--border); padding-top: 20px; }

        .brand-logo h2 { font-size: 1rem; margin: 0; color: var(--accent); }
        .brand-logo span { font-size: 0.6rem; letter-spacing: 3px; }

        /* USER CARD */
        .user-card { background: rgba(209, 179, 139, 0.05); border: 1px solid rgba(209, 179, 139, 0.2); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .user-card label { font-size: 0.7rem; color: #9ca3af; display: block; }
        .user-card .name { font-weight: bold; font-size: 0.9rem; margin-top: 5px; display: block; }
        .user-card .id { font-family: monospace; font-size: 0.6rem; color: var(--accent); word-break: break-all; margin-top: 5px; display: block; }

        /* FOOTER SIDEBAR */
        .social-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .social-links a { color: var(--text-light); font-size: 1.1rem; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .social-links span { font-size: 0.45rem; letter-spacing: 1px; }

        .btn-exit { background: transparent; border: 1px solid #ef4e4e; color: #ef4e4e; padding: 8px; border-radius: 4px; cursor: pointer; width: 100%; font-size: 0.8rem; transition: 0.3s; }
        .btn-exit:hover { background: #ef4e4e; color: white; }

        /* PAINEL PRINCIPAL (CINZA) */
        .main-panel { flex-grow: 1; background-color: var(--gray-panel); margin: 20px; border-radius: 40px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); }

        .placeholder-content { text-align: center; opacity: 0.25; }
        .placeholder-content i { font-size: 8rem; margin-bottom: 20px; display: block; }
        .placeholder-content p { font-size: 1.2rem; letter-spacing: 2px; margin: 0; }
    </style>
</head>
<body>

     <div class="sidebar">
        <div class="nav-section">
            <a href="hela_smarthome.html" class="ambient-card a70-font">
                <i class="fas fa-snake"></i> HELA SMARTHOME
            </a>
            <a href="freia_terrarium.html" class="ambient-card a70-font">
                <i class="fas fa-owl"></i> FREIA TERRARIUM
            </a>
            <a href="loki_home.html" class="ambient-card a70-font">
                <i class="fas fa-frog"></i> LOKI HOME
            </a>
            <a href="senua_ambient.html" class="ambient-card active a70-font">
                <i class="fas fa-turtle"></i> SENUA AMBIENT
            </a>
        </div>
         
         <div class="nav-section-bottom">
            <a href="register_ambient.html" class="ambient-card add-card a70-font">
            <i class="fas fa-plus-circle"></i> ADD NEW
            </a>
        </div>

        <div class="brand-logo a70-font">
            <h2>TERRACONNECT</h2>
            <span>TECHNOLOGIES</span>
        </div>

        <div class="user-card">
            <label>User:</label>
            <span id="userName" class="name">Loading...</span>
            <span id="userId" class="id">---</span>
        </div>

        <div class="social-links a70-font">
            <a href="#"><i class="fas fa-asterisk"></i><span>LINKTREE</span></a>
            <a href="#"><i class="fab fa-instagram"></i><span>INSTAGRAM</span></a>
        </div>

        <button class="btn-exit" onclick="logout()">Log out</button>
    </div>

    <div class="main-panel">
        <div class="placeholder-content a70-font">
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
                <i class="fas fa-chevron-left" style="font-size: 5rem;"></i>
                <i class="fas fa-list-ul" style="font-size: 5rem;"></i>
            </div>
            <p>SELECT YOUR MONITORED AMBIENT</p>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) { window.location.href = 'index.html'; }

        document.getElementById('userName').innerText = user.name || "User";
        document.getElementById('userId').innerText = `ID: ${user.id}`;

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
