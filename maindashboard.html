<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0d1117;
            --accent: #d1b38b; /* Cor Gold/Tan A70 */
            --text-light: #f4e9d8;
            --gray-panel: #1e1e1e;
            --border: #2d3139;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
        }

        /* TIPOGRAFIA A70 PARA TÍTULOS E LOGOS */
        .a70-font {
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        /* CARDS DE SELEÇÃO (ANIMAIS/AMBIENTES) */
        .nav-section {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ambient-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 12px 15px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text-light);
        }

        .ambient-card i { font-size: 1.2rem; color: var(--accent); }

        .ambient-card:hover {
            background: var(--accent);
            color: var(--bg-dark);
        }

        .ambient-card:hover i { color: var(--bg-dark); }

        .brand-logo {
            text-align: center;
            margin: 30px 0;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        .brand-logo h2 { font-size: 1rem; margin: 0; color: var(--accent); }
        .brand-logo span { font-size: 0.6rem; letter-spacing: 3px; }

        /* CARD DE USUÁRIO */
        .user-card {
            background: rgba(209, 179, 139, 0.05);
            border: 1px solid rgba(209, 179, 139, 0.2);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .user-card label { font-size: 0.7rem; color: #9ca3af; display: block; }
        .user-card .name { font-weight: bold; font-size: 0.95rem; margin-top: 5px; display: block; }
        .user-card .id { font-family: monospace; font-size: 0.65rem; color: var(--accent); word-break: break-all; margin-top: 5px; display: block; }

        /* REDES SOCIAIS E SAIR */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .social-links a {
            color: var(--text-light);
            font-size: 1.2rem;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .social-links span { font-size: 0.5rem; letter-spacing: 1px; }

        .btn-exit {
            background: transparent;
            border: 1px solid #ef4e4e;
            color: #ef4e4e;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 0.8rem;
        }

        .btn-exit:hover { background: #ef4e4e; color: white; }

        /* SEÇÃO CINZA CENTRAL */
        .main-panel {
            flex-grow: 1;
            background-color: var(--gray-panel);
            margin: 20px;
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .placeholder-content {
            text-align: center;
            opacity: 0.3;
        }

        .placeholder-content i { font-size: 10rem; margin-bottom: 20px; }
        .placeholder-content p { font-size: 1.5rem; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-section">
            <div class="ambient-card a70-font">
                <i class="fas fa-snake"></i> HELA SMARTHOME
            </div>
            <div class="ambient-card a70-font">
                <i class="fas fa-owl"></i> FREIA TERRARIUM
            </div>
            <div class="ambient-card a70-font">
                <i class="fas fa-frog"></i> LOKI HOME
            </div>
            <div class="ambient-card a70-font">
                <i class="fas fa-turtle"></i> SENUA AMBIENT
            </div>
        </div>

        <div class="brand-logo a70-font">
            <h2>TERRACONNECT</h2>
            <span>TECHNOLOGIES</span>
        </div>

        <div class="user-card">
            <label>Usuário:</label>
            <span id="userName" class="name">Carregando...</span>
            <span id="userId" class="id">---</span>
        </div>

        <div class="social-links a70-font">
            <a href="#"><i class="fas fa-asterisk"></i><span>LINKTREE</span></a>
            <a href="#"><i class="fab fa-instagram"></i><span>INSTAGRAM</span></a>
        </div>

        <button class="btn-exit" onclick="logout()">Sair</button>
    </div>

    <div class="main-panel">
        <div class="placeholder-content a70-font">
            <i class="fas fa-chevron-left"></i>
            <i class="fas fa-list-ul"></i>
            <p>Select your monitored ambient</p>
        </div>
    </div>

    <script>
        // Gestão de Sessão
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) { window.location.href = 'index.html'; }

        // Preencher dados do usuário
        document.getElementById('userName').innerText = user.name || "Usuário";
        document.getElementById('userId').innerText = `ID: ${user.id}`;

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
