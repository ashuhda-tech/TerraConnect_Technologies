<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | New Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070b14;
            --accent: #d1b38b;
            --border: #2d3139;
            --text-light: #f4e9d8;
        }

        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }

        .register-container { background: #0d1117; padding: 40px; border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
        .a70-font { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        h1 { color: var(--accent); font-size: 1.2rem; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        
        label { font-size: 0.7rem; color: var(--accent); display: block; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: white; border-radius: 4px; box-sizing: border-box; }

        .info-box { background: rgba(209, 179, 139, 0.05); padding: 10px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 25px; border: 1px solid rgba(209, 179, 139, 0.1); }
        .btn-save { background: var(--accent); color: var(--bg-dark); border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn-save:hover { filter: brightness(1.1); } 
        .btn-back { display: block; margin-top: 15px; color: #9ca3af; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="register-container" style="max-width: 500px;">
    <h1 class="a70-font">NEW REGISTRATION</h1>
    
    <div class="info-box">
        <span style="font-size: 0.6rem;">VINCULADO AO ID:</span>
        <strong id="displayUserId" style="font-size: 0.6rem;">---</strong>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left;">
        <div class="input-group">
            <label class="a70-font">AMBIENT NAME</label>
            <input type="text" id="ambientName" placeholder="Ex: Hela Smarthome">
        </div>
        <div class="input-group">
            <label class="a70-font">ANIMAL NAME</label>
            <input type="text" id="animalName" placeholder="Ex: Hela">
        </div>
        <div class="input-group">
            <label class="a70-font">SCIENTIFIC NAME</label>
            <input type="text" id="scientificName" placeholder="Ex: Lampropeltis getula">
        </div>
        <div class="input-group">
            <label class="a70-font">BIRTH DATE</label>
            <input type="date" id="birthDate">
        </div>
        <div class="input-group">
            <label class="a70-font">REGISTRATION Nº</label>
            <input type="text" id="regNumber" placeholder="IBAMA / MAPA">
        </div>
        <div class="input-group">
            <label class="a70-font">LOCATION (LAT/LONG)</label>
            <input type="text" id="location" placeholder="-23.55, -46.63">
        </div>
    </div>

    <div class="input-group" style="margin-top: 15px;">
        <label class="a70-font">ANIMAL PHOTO (MAX 1MB)</label>
        <input type="file" id="animalPhoto" accept="image/*" style="font-size: 0.7rem; border: none; background: none;">
        <canvas id="resizeCanvas" style="display:none;"></canvas>
    </div>

    <button class="btn-save a70-font" style="margin-top: 20px;" onclick="processRegistration()">COMPLETE REGISTRATION</button>
    <a href="maindashboard.html" class="btn-back">CANCEL AND BACK</a>
</div>





    
    <script>
        // Recupera o usuário logado para vincular o registro
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!user) { window.location.href = 'index.html'; }

        document.getElementById('displayUserId').innerText = user.id;

        
    async function processRegistration() {
    const fields = {
        ambientName: document.getElementById('ambientName').value,
        animalName: document.getElementById('animalName').value,
        scientificName: document.getElementById('scientificName').value,
        birthDate: document.getElementById('birthDate').value,
        regNumber: document.getElementById('regNumber').value,
        location: document.getElementById('location').value
    };

    if (!fields.ambientName || !fields.animalName) return alert("Please fill Name and Ambient.");

    const pageId = 'PG-' + Math.random().toString(36).substr(2, 6).toUpperCase();
    let photoData = "";

    // Processamento da Imagem
    const fileInput = document.getElementById('animalPhoto');
    if (fileInput.files[0]) {
        photoData = await resizeImage(fileInput.files[0]);
    }

    const payload = {
        userID: user.id,
        pageID: pageId,
        ...fields,
        photoBase64: photoData,
        timestamp: new Date().toLocaleString('pt-BR')
    };

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyz6-BqV6DooYxcfN2JI3zGrpTJXD8pgqtfkStPmX7YfAieJ2FOsVDxWk7u6vTURfk/exec';

    // AVISO: Removi os comentários /* */ para o código funcionar
    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(payload)
        });
        alert(`SUCCESS!\nPageID: ${pageId} registered.`);
        window.location.href = 'maindashboard.html';
    } catch (e) { alert("Error connecting to database."); }
}

// Função para comprimir a foto e caber no limite do Excel
function resizeImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.getElementById('resizeCanvas');
                const MAX_WIDTH = 200; // Tamanho pequeno para o dashboard
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                resolve(canvas.toDataURL('image/jpeg', 0.7)); // Qualidade 70%
            };
        };
    });
}
        catch (error) {
        console.error("Error:", error);
        alert("Connection failed. Check your internet or Script URL.");
    }
}
    </script>
</body>
</html>
