<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Portal | Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Custom Font Import --- */
        @font-face {
            font-family: 'A760-Roman-Smc';
            src: url('A760-Roman-Smc Regular.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #1a1c20;          
            --card-bg: #070b14;            
            --card-hover: #111827;        
            --card-border: #1f2937;       
            --accent-dark: #d1b38b;       
            --accent-light: #f4e9d8;      
            --text-main: #f4e9d8;         
            --text-muted: #d1b38b;
            --border-radius: 10px;

            /* STATUS COLORS */
            --status-ok: #48bb3a;      
            --status-process: #3ba0e2; 
            --status-warn: #ff683b;    
            --status-error: #ef4e4e;   

            /* Standard UI Font */
            --font-standard: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-standard);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .auth-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: background-color 0.3s ease;
        }

        .auth-card:hover {
            background-color: var(--card-hover);
        }

        h1 {
            font-family: 'A760-Roman-Smc', sans-serif;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
            color: var(--accent-light);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Forms */
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input {
            background-color: #111827;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-family: var(--font-standard);
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-dark);
        }

        .btn-primary {
            background-color: var(--accent-dark);
            color: var(--card-bg);
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: var(--accent-light);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--card-border);
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--card-border);
        }

        .divider span {
            padding: 0 10px;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        /* Social Auth Grid */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn-social {
            background-color: transparent;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-main);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-social:hover {
            border-color: var(--accent-dark);
            background-color: rgba(209, 179, 139, 0.1);
        }

        .footer-link {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--accent-dark);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        /* Auth View Toggle */
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="auth-card">
        <div id="login-section">
            <h1>TerraConnect Technologies</h1>
            <p class="subtitle">Access your sensor hub</p>
            
            <form class="auth-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" placeholder="example@server.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary">SIGN IN</button>
            </form>

            <div class="divider">
                <span>Or sign in with</span>
            </div>

            <div class="social-grid">
                <button class="btn-social" title="Google"><i class="fab fa-google"></i></button>
                <button class="btn-social" title="LinkedIn"><i class="fab fa-linkedin-in"></i></button>
                <button class="btn-social" title="Facebook"><i class="fab fa-facebook-f"></i></button>
            </div>

            <p class="footer-link">
                Don't have an account? <a href="#" onclick="toggleAuth()">Sign up</a>
            </p>
        </div>

        <div id="signup-section" class="hidden">
            <h1>Create Account</h1>
            <p class="subtitle">Register for the client portal</p>
            
            <form class="auth-form" onsubmit="event.preventDefault();">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Work Email</label>
                    <input type="email" placeholder="name@company.com">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="Create a strong password">
                </div>
                <button type="submit" class="btn-primary">COMPLETE REGISTRATION</button>
            </form>

            <div class="divider">
                <span>Or register with</span>
            </div>

            <div class="social-grid">
                <button class="btn-social" title="Google"><i class="fab fa-google"></i></button>
                <button class="btn-social" title="LinkedIn"><i class="fab fa-linkedin-in"></i></button>
                <button class="btn-social" title="Facebook"><i class="fab fa-facebook-f"></i></button>
            </div>

            <p class="footer-link">
                Already have access? <a href="#" onclick="toggleAuth()">Sign in</a>
            </p>
        </div>
    </div>
</div>

<script>
    // Toggle between Login and Signup views
    function toggleAuth() {
        const login = document.getElementById('login-section');
        const signup = document.getElementById('signup-section');
        
        login.classList.toggle('hidden');
        signup.classList.toggle('hidden');
    }
</script>

</body>
</html>
