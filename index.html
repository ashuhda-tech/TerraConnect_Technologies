<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTLog7uhFw___9q5ossjzRuKZq6VkC3HqgsD52RAd1y5FigIwCqmEyFeLc-_qgS1RAwtlcIhr_zK-nn/pub?gid=0&single=true&output=csv';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsEcjSOadz5FmvEg8RINSfx-qPSN7ccMPzAhwk904WOj_ZRNS2aCZ_cSc9I25rnFw/exec';

    async function fetchUsers() {
        try {
            const response = await fetch(`${CSV_URL}&t=${new Date().getTime()}`);
            const data = await response.text();
            const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);
            
            return rows.map(row => {
                const col = row.split(',');
                return { 
                    name: col[0]?.trim(), 
                    email: col[1]?.trim().toLowerCase(), 
                    pass: col[2]?.trim(),
                    id: col[3]?.trim(),
                    channelId: col[4]?.trim(), // Coluna E
                    apiKey: col[5]?.trim()    // Coluna F
                };
            });
        } catch (error) {
            return [];
        }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('loginMsg');
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const pass = document.getElementById('loginPass').value.trim();

        msg.innerText = "Autenticando...";
        const users = await fetchUsers();
        const user = users.find(u => u.email === email && u.pass === pass);

        if (user) {
            // Verifica se o usuário já tem as chaves do ThingSpeak vinculadas
            if (!user.channelId || !user.apiKey) {
                console.warn("Atenção: Este usuário ainda não possui um canal ThingSpeak vinculado no Excel.");
            }

            localStorage.setItem('currentUser', JSON.stringify(user));
            msg.innerText = "Sucesso! Entrando...";
            msg.className = "message success";
            
            setTimeout(() => { window.location.href = 'home.html'; }, 1000);
        } else {
            msg.innerText = "E-mail ou senha inválidos.";
            msg.className = "message error";
        }
    });

    // Signup Logic (Mantido o padrão anterior)
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('signupMsg');
        const payload = {
            name: document.getElementById('regName').value,
            email: document.getElementById('regEmail').value.toLowerCase().trim(),
            pass: document.getElementById('regPass').value
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            msg.innerText = "Cadastro enviado! Preencha o ChannelID no Excel para ativar os sensores.";
            msg.className = "message success";
            e.target.reset();
        } catch (e) {
            msg.className = "message error";
            msg.innerText = "Erro ao conectar.";
        }
    });

    function toggleAuth() {
        document.getElementById('login-section').classList.toggle('hidden');
        document.getElementById('signup-section').classList.toggle('hidden');
    }
</script>
