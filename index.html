<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Portal | Auth System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'A760-Roman-Smc';
            src: url('A760-Roman-Smc Regular.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #1a1c20;          
            --card-bg: #070b14;            
            --card-hover: #111827;        
            --card-border: #1f2937;       
            --accent-dark: #d1b38b;       
            --accent-light: #f4e9d8;      
            --text-main: #f4e9d8;         
            --text-muted: #d1b38b;
            --border-radius: 10px;
            --status-error: #ef4e4e;
            --status-ok: #48bb3a;
            --font-standard: 'Inter', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-standard);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Ajuste de Flexibilidade do Card */
        .auth-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 40px;
            width: fit-content; /* Ajusta ao conteúdo */
            min-width: 350px;
            max-width: 90vw;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'A760-Roman-Smc', sans-serif;
            font-size: 2.2rem;
            text-align: center;
            margin-bottom: 5px;
            color: var(--accent-light);
            white-space: nowrap; /* Evita quebra do título */
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .auth-form { display: flex; flex-direction: column; gap: 15px; }

        .input-group { display: flex; flex-direction: column; gap: 5px; }

        label { font-size: 0.85rem; color: var(--text-muted); }

        input {
            background-color: #111827;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            outline: none;
        }

        input:focus { border-color: var(--accent-dark); }

        .btn-primary {
            background-color: var(--accent-dark);
            color: var(--card-bg);
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: var(--card-border);
        }

        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--card-border); }
        .divider span { padding: 0 10px; font-size: 0.75rem; color: var(--text-muted); }

        .social-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .btn-social {
            background: none;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 10px;
            color: var(--text-main);
            cursor: pointer;
        }

        .btn-social:hover { border-color: var(--accent-dark); }

        .footer-link { margin-top: 25px; text-align: center; font-size: 0.85rem; color: var(--text-muted); }
        .footer-link a { color: var(--accent-dark); text-decoration: none; font-weight: bold; }

        .message {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 10px;
            min-height: 1.2rem;
        }

        .error { color: var(--status-error); }
        .success { color: var(--status-ok); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <div id="login-section">
        <h1>MONITORING</h1>
        <p class="subtitle">Access your sensor hub</p>
        
        <form class="auth-form" id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPass" required>
            </div>
            <button type="submit" class="btn-primary">SIGN IN</button>
            <div id="loginMsg" class="message"></div>
        </form>

        <div class="divider"><span>Or sign in with</span></div>
        <div class="social-grid">
            <button class="btn-social"><i class="fab fa-google"></i></button>
            <button class="btn-social"><i class="fab fa-linkedin-in"></i></button>
            <button class="btn-social"><i class="fab fa-facebook-f"></i></button>
        </div>
        <p class="footer-link">Don't have an account? <a href="#" onclick="toggleAuth()">Sign up</a></p>
    </div>

    <div id="signup-section" class="hidden">
        <h1>CREATE ACCOUNT</h1>
        <p class="subtitle">Register for the client portal</p>
        
        <form class="auth-form" id="signupForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="regName" required>
            </div>
            <div class="input-group">
                <label>Work Email</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPass" required>
            </div>
            <button type="submit" class="btn-primary">REGISTER</button>
            <div id="signupMsg" class="message"></div>
        </form>

        <p class="footer-link">Already have access? <a href="#" onclick="toggleAuth()">Sign in</a></p>
    </div>
</div>

<script>
    // --- DATABASE LOGIC (LocalStorage) ---

    // Get users from "database"
    const getUsers = () => JSON.parse(localStorage.getItem('portal_users')) || [];

    // Save user
    const saveUser = (user) => {
        const users = getUsers();
        users.push(user);
        localStorage.setItem('portal_users', JSON.stringify(users));
    };

    // --- FORM HANDLING ---

    // Signup Logic
    document.getElementById('signupForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const pass = document.getElementById('regPass').value;
        const msg = document.getElementById('signupMsg');

        const users = getUsers();
        const userExists = users.find(u => u.email === email);

        if (userExists) {
            msg.innerText = "User already registered!";
            msg.className = "message error";
        } else {
            saveUser({ name, email, pass });
            msg.innerText = "Account created! You can now log in.";
            msg.className = "message success";
            e.target.reset();
        }
    });

    // Login Logic
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;
        const msg = document.getElementById('loginMsg');

        const users = getUsers();
        const user = users.find(u => u.email === email && u.pass === pass);

        if (user) {
            msg.innerText = `Welcome, ${user.name}! Redirecting...`;
            msg.className = "message success";
            // Here you would redirect: window.location.href = 'dashboard.html';
        } else {
            msg.innerText = "Invalid email or password.";
            msg.className = "message error";
        }
    });

    function toggleAuth() {
        document.getElementById('login-section').classList.toggle('hidden');
        document.getElementById('signup-section').classList.toggle('hidden');
        document.getElementById('loginMsg').innerText = "";
        document.getElementById('signupMsg').innerText = "";
    }
</script>

</body>
</html>
