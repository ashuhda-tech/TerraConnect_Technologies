<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Hela Smarthome</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0d1117;
            --accent: #d1b38b; 
            --text-light: #f4e9d8;
            --gray-panel: #1e1e1e;
            --border: #2d3139;
            --ok-green: #48bb3a;
        }

        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .a70-font { font-family: 'Cinzel', serif; letter-spacing: 1px; }

        /* BARRA LATERAL (CONFORME SEU TXT) */
        .sidebar { width: 300px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .nav-section { flex-grow: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        .ambient-card { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); padding: 12px 15px; border-radius: 4px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s; text-decoration: none; color: var(--text-light); font-size: 0.85rem; }
        .ambient-card.active { background: var(--accent); color: var(--bg-dark); }
        .ambient-card i { color: inherit; width: 20px; text-align: center; }

        /* Card Especial: ADICIONAR NOVO */
        .add-card {border: 1px dashed var(--accent); background: transparent; opacity: 0.6; margin-top: 10px;}
        .add-card:hover {opacity: 1; background: rgba(209, 179, 139, 0.1);= color: var(--accent); border-style: solid;}
       
        .brand-logo { text-align: center; margin: 25px 0; border-top: 1px solid var(--border); padding-top: 20px; }
        .brand-logo h2 { font-size: 1rem; margin: 0; color: var(--accent); }
        .user-card { background: rgba(209, 179, 139, 0.05); border: 1px solid rgba(209, 179, 139, 0.2); padding: 15px; border-radius: 8px; margin-bottom: 20px; }

        /* PAINEL PRINCIPAL - ESTILOS QUE FALTAVAM */
        .main-panel { flex-grow: 1; background-color: var(--gray-panel); margin: 20px; border-radius: 40px; padding: 30px; display: flex; flex-direction: column; overflow-y: auto; border: 1px solid var(--border); }
        
        .header-monitor { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header-monitor h1 { font-size: 1.8rem; margin: 0; }
        
        .status-badges { display: flex; gap: 15px; }
        .status-item { background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 50px; font-size: 0.7rem; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
        .status-item i { color: var(--ok-green); }

        /* GRID DE SENSORES (WEB2.JPG) */
        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .sensor-mini-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; }
        .sensor-mini-card label { font-size: 0.65rem; color: #9ca3af; display: block; margin-bottom: 5px; }
        .sensor-mini-card .value { font-size: 1.4rem; font-weight: bold; }
        .sensor-mini-card .unit { font-size: 0.8rem; color: var(--accent); margin-left: 4px; }

        /* ÁREA DE GRÁFICOS */
        .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; flex-grow: 1; min-height: 250px; }
        .chart-box { background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; }
        .chart-box h3 { font-size: 0.8rem; margin: 0 0 15px 0; opacity: 0.7; }
        .chart-container { flex-grow: 1; position: relative; }

        .footer-label { margin-top: 20px; text-align: center; opacity: 0.4; font-size: 0.7rem; letter-spacing: 5px; }

                /* FOOTER SIDEBAR */
        .social-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
        .social-links a { color: var(--text-light); font-size: 1.1rem; text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .social-links span { font-size: 0.45rem; letter-spacing: 1px; }
        
        .btn-back { background: transparent; border: 1px solid #d1b38b; color: #d1b38b; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-back:hover { background: #d1b38b; color: #070b14; }
        
        .btn-exit { background: transparent; border: 1px solid #ef4e4e; color: #ef4e4e; padding: 8px; border-radius: 4px; width: 100%; cursor: pointer; transition: 0.3s; }
        .btn-exit:hover { background: #ef4e4e; color: white; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-section">
            <a href="hela_smarthome.html" class="ambient-card active a70-font">
                <i class="fas fa-snake"></i> HELA SMARTHOME
            </a>
        </div>

        <div class="nav-section-bottom">
            <a href="freia_terrarium.html" class="ambient-card a70-font">
                <i class="fas fa-owl"></i> FREIA TERRARIUM
            </a>
            <a href="loki_home.html" class="ambient-card a70-font">
                <i class="fas fa-frog"></i> LOKI HOME
            </a>
            <a href="senua_ambient.html" class="ambient-card a70-font">
                <i class="fas fa-turtle"></i> SENUA AMBIENT
            </a>
            <div class="ambient-card add-card a70-font" onclick="addNewAmbient()">
                <i class="fas fa-plus-circle"></i> ADD NEW
            </div>
        </div>

        <div class="brand-logo a70-font">
            <h2>TERRACONNECT</h2>
            <span>TECHNOLOGIES</span>
        </div>

        <div class="user-card">
            <label style="font-size: 0.7rem;">User:</label>
            <span id="userName" style="display: block; font-weight: bold; font-size: 0.9rem;">Loading...</span>
            <span id="userId" style="font-size: 0.6rem; color: var(--accent); word-break: break-all;">---</span>
        </div>
        <div class="social-links a70-font">
            <a href="#"><i class="fas fa-asterisk"></i><span>LINKTREE</span></a>
            <a href="#"><i class="fab fa-instagram"></i><span>INSTAGRAM</span></a>
        </div>
        
        <div class="social-links a70-font">
        <button class="btn-back" onclick="location.href='maindashboard.html'">Back</button>
        </div>
            
        <div class="social-links a70-font">
        <button class="btn-exit" onclick="location.href='index.html'">Log out</button>
        </div>
    </div>

    <div class="main-panel">
        <div class="header-monitor">
            <h1 id="mainTitle"class="a70-font">Loading...</h1>
            <div class="status-badges a70-font">
                <div class="status-item"><i class="fas fa-check-circle"></i> STABLE ENVIRONMENT</div>
                <div class="status-item"><i class="fas fa-wifi"></i> CONECTED</div>
            </div>
        </div>

        <div class="data-grid">
            <div class="sensor-mini-card">
                <label>CO2 Concentration</label>
                <div class="value" id="co2Value">1212<span class="unit">ppm</span></div>
            </div>
            <div class="sensor-mini-card">
                <label>Temperature</label>
                <div class="value" id="tempValue">--<span class="unit">°C</span></div>
            </div>
            <div class="sensor-mini-card">
                <label>Air Humidity</label>
                <div class="value" id="humValue">--<span class="unit">%</span></div>
            </div>
            <div class="sensor-mini-card">
                <label>Soil Humidity</label>
                <div class="value">0<span class="unit">%</span></div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-box">
                <h3 class="a70-font">HISTORICAL TEMPERATURE SERIES</h3>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <h3 class="a70-font">HISTORICAL HUMIDITY SERIES</h3>
                <div class="chart-container">
                    <canvas id="humChart"></canvas>
                </div>
            </div>
        </div>

        <div id="footerLabel" class="footer-label a70-font">ACTIVE SYSTEM</div>
    </div>

    <script>
        // Lógica de Usuário
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (user) {
            document.getElementById('userName').innerText = user.name;
            document.getElementById('userId').innerText = `ID: ${user.id}`;
        }

        // Configuração dos Gráficos
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                x: { display: false },
                y: { grid: { color: '#2d3139' }, ticks: { color: '#d1b38b', font: { size: 10 } } }
            }
        };

        const tempChart = new Chart(document.getElementById('tempChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#d1b38b', tension: 0.4, fill: true, backgroundColor: 'rgba(209, 179, 139, 0.1)' }] },
            options: commonOptions
        });

        const humChart = new Chart(document.getElementById('humChart'), {
            type: 'line',
            data: { labels: [], datasets: [{ data: [], borderColor: '#48bb3a', tension: 0.4, fill: true, backgroundColor: 'rgba(72, 187, 58, 0.1)' }] },
            options: commonOptions
        });

        async function updateData() {
            try {
                const response = await fetch('https://api.thingspeak.com/channels/2246700/feeds.json?results=15');
                const data = await response.json();
                const lastFeed = data.feeds[data.feeds.length - 1];

                document.getElementById('tempValue').innerHTML = `${parseFloat(lastFeed.field1).toFixed(1)}<span class="unit">°C</span>`;
                document.getElementById('humValue').innerHTML = `${parseFloat(lastFeed.field2).toFixed(1)}<span class="unit">%</span>`;

                const labels = data.feeds.map(f => new Date(f.created_at).toLocaleTimeString());
                tempChart.data.labels = labels;
                tempChart.data.datasets[0].data = data.feeds.map(f => f.field1);
                tempChart.update();

                humChart.data.labels = labels;
                humChart.data.datasets[0].data = data.feeds.map(f => f.field2);
                humChart.update();

            } catch (e) { console.error("Erro no fetch:", e); }
        }

        setInterval(updateData, 15000);
        updateData();

        function syncActiveName() {
    // 1. Busca o elemento que tem as duas classes ao mesmo tempo
    const activeCard = document.querySelector('.ambient-card.active');
    
    if (activeCard) {
        // 2. Pega apenas o texto, ignorando o ícone
        const activeName = activeCard.innerText.trim();

        // 3. Distribui o nome para os locais desejados
        document.getElementById('mainTitle').innerText = activeName;
        document.getElementById('footerLabel').innerText = `${activeName} MONITORING`;
        document.title = `TerraConnect | ${activeName}`;
    }
}

// Executa a função assim que a página carrega
window.onload = function() { syncActiveName(); updateData(); // Mantém sua função de carregar o ThingSpeak
                           };
    
function addNewAmbient() { alert("Em breve: Aqui abriremos um formulário para você cadastrar um novo ambiente e vincular ao ThingSpeak!"); }
    </script>
</body>
</html>
