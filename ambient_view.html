<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #070b14;
            --sidebar-bg: #0d1117;
            --accent: #d1b38b;
            --border: #1f2937;
            --card-bg: #161b22;
            --text-light: #f4e9d8;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-light); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .a70-font { font-family: 'Cinzel', serif; letter-spacing: 2px; }

        /* --- SIDEBAR LAYOUT --- */
        .sidebar {  width: 320px; background-color: var(--sidebar-bg); border-right: 1px solid var(--border);  padding: 25px; display: flex; flex-direction: column;  overflow-y: auto; flex-shrink: 0; }

        .btn-back { text-decoration: none; color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; border-radius: 5px;  font-size: 0.8rem; transition: 0.3s; display: inline-block; margin-bottom: 30px; text-align: center; }
        .btn-back:hover { background: var(--accent); color: var(--bg-dark); }

        .bio-section { text-align: center; margin-bottom: 30px; }
        .animal-photo {  width: 180px; height: 180px;  border-radius: 50%;  border: 3px solid var(--accent);  object-fit: cover;  margin: 0 auto 15px; background: #1a1c20; display: block;  }

        .bio-info-list { display: flex; flex-direction: column; gap: 20px; text-align: left; }
        .bio-item b { color: var(--accent); display: block; font-size: 0.75rem; text-transform: uppercase; margin-bottom: 4px; }
        .bio-item span { font-size: 0.9rem; color: var(--text-light); }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-content { flex: 1;  padding: 40px;  overflow-y: auto;  background: radial-gradient(circle at top right, #0d1117 0%, #070b14 100%);  }

        .main-header { margin-bottom: 40px; }
        .main-header h1 { font-size: 2.5rem; margin: 0; color: var(--accent); }
        .main-header p { color: var(--text-muted); margin: 5px 0 0; }

        /* GRID DE 8 CARDS */
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;  margin-bottom: 25px;  }

        .sensor-card { background: var(--card-bg);  border: 1px solid var(--border);  border-radius: 12px;  padding: 15px;  display: flex;  align-items: center;  gap: 12px; transition: 0.2s; }
        .sensor-card:hover { border-color: var(--accent); }

        .sensor-icon { font-size: 1.5rem; width: 35px; text-align: center; }
        .sensor-data { display: flex; flex-direction: column; }
        .sensor-label { color: var(--text-muted); font-size: 0.65rem; text-transform: uppercase; font-weight: 600; }
        .sensor-val { font-size: 1.4rem; font-weight: 700; color: var(--text-light); line-height: 1.2; }
        .sensor-val span { font-size: 0.75rem; margin-left: 3px; color: var(--text-muted); }

        .chart-container { background: var(--card-bg); border: 1px solid var(--border);  border-radius: 15px;  padding: 25px;  height: 400px; }

        @media (max-width: 900px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            .main-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="maindashboard.html" class="btn-back a70-font"><i class="fas fa-arrow-left"></i> DASHBOARD</a>
        
        <div class="bio-section">
            <img id="dynPhoto" src="" alt="Animal Photo" class="animal-photo">
            <h2 id="dynName" class="a70-font" style="margin: 0; color: var(--accent);">---</h2>
        </div>

        <div class="bio-info-list">
            <div class="bio-item"><b>Scientific Name</b> <span id="dynScientific">---</span></div>
            <div class="bio-item"><b>Sexagem</b> <span id="dynGender">---</span></div>
            <div class="bio-item"><b>Birth Date</b> <span id="dynBirth">---</span></div>
            <div class="bio-item"><b>Registration</b> <span id="dynReg">---</span></div>
            <div class="bio-item"><b>Coordinates</b> <span id="dynLoc">---</span></div>
            <div class="bio-item"><b>Channel ID</b> <span id="dynChannel">---</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="main-header">
            <h1 id="dynAmbient" class="a70-font">LOADING...</h1>
            <p id="dynStatus">Real-time Environmental Monitoring</p>
        </header>


<!-- GRID DE 8 CARDS -->
       <div class="sensor-grid">
            <div class="sensor-card">
                <i class="fas fa-cloud sensor-icon" style="color: #a3b18a;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">CO2</span>
                    <div class="sensor-val" id="valField1">--<span>ppm</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-thermometer-half sensor-icon" style="color: #ff5f5f;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">Temp. Ar</span>
                    <div class="sensor-val" id="valField2">--<span>°C</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-droplet sensor-icon" style="color: #4da3ff;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">Umidade Ar</span>
                    <div class="sensor-val" id="valField3">--<span>%</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-seedling sensor-icon" style="color: #8c7851;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">Umidade Solo</span>
                    <div class="sensor-val" id="valField4">--<span>%</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-water sensor-icon" style="color: #00f2ff;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">Nível Água</span>
                    <div class="sensor-val" id="valField5">--<span>%</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-microchip sensor-icon" style="color: #ff9f43;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">RS | Temp</span>
                    <div class="sensor-val" id="valField6">--<span>°C</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-wind sensor-icon" style="color: #74b9ff;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">RS | Hum Ar</span>
                    <div class="sensor-val" id="valField7">--<span>%</span></div>
                </div>
            </div>
            <div class="sensor-card">
                <i class="fas fa-mountain sensor-icon" style="color: #d4a373;"></i>
                <div class="sensor-data">
                    <span class="sensor-label">RS | Solo</span>
                    <div class="sensor-val" id="valField8">--<span>%</span></div>
                </div>
            </div>
        </div>

        

        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </main>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const currentPageId = urlParams.get('id');
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTeBz5FwvcmPue3hJ6TKwmrNZeMrz2_Su7co-mPuzKj1ZJv--5BBvPjlszF3yyEHOVuEeGT9mmwZqOp/pub?gid=0&single=true&output=csv';
    
    let tsReadURL = "";
    let mainChart;

    async function loadData() {
        if (!currentPageId) return;

        try {
            const response = await fetch(CSV_URL);
            const csvData = await response.text();
            
            const rows = csvData.split('\n').map(row => {
                const pattern = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
                return row.split(pattern).map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            const data = rows.find(r => r[1] === currentPageId);

            if (data) {
                // Sidebar Data
                document.getElementById('dynName').innerText = data[3] || "---";
                document.getElementById('dynScientific').innerText = data[4] || "---";
                document.getElementById('dynBirth').innerText = data[5] || "---";
                document.getElementById('dynReg').innerText = data[6] || "---";
                document.getElementById('dynLoc').innerText = `${data[7]}, ${data[8]}` || "---";
                document.getElementById('dynChannel').innerText = data[9] || "---";
                
                // Gender (Assumindo que está na próxima coluna disponível N=13 ou O=14)
                // Se ainda não tiver no Excel, deixará como "---"
                document.getElementById('dynGender').innerText = data[14] || "N/A";

                // Main Content Data
                document.getElementById('dynAmbient').innerText = (data[2] || "Ambient").toUpperCase();
                
                if (data[12]) document.getElementById('dynPhoto').src = data[12];

                // ThingSpeak Configuration
                const channelID = data[9];
                const readKey = data[10];
                tsReadURL = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=24`;

                initChart();
                updateSensors();
                setInterval(updateSensors, 20000);
            }
        } catch (e) { console.error("Database error:", e); }
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (mainChart) mainChart.destroy();
        
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temp °C', data: [], borderColor: '#d1b38b', backgroundColor: 'rgba(209, 179, 139, 0.1)', fill: true, tension: 0.4, yAxisID: 'y' },
                    { label: 'Hum %', data: [], borderColor: '#4da3ff', backgroundColor: 'rgba(77, 163, 255, 0.1)', fill: true, tension: 0.4, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', position: 'left', grid: { color: '#1f2937' }, ticks: { color: '#d1b38b' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#4da3ff' } },
                    x: { grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } }
                },
                plugins: { legend: { labels: { color: '#f4e9d8' } } }
            }
        });
    }

           async function updateSensors() {
            if (!tsReadURL) return;
            try {
            const res = await fetch(tsReadURL);
            const json = await res.json();
            const last = json.feeds[json.feeds.length - 1];

            // Atualiza os 8 campos do thinkspeak dinamicamente
            for(let i=1; i<=8; i++) {
                const val = last[`field${i}`];
                const el = document.getElementById(`valField${i}`);
                if (val !== null && el) {
                    const unit = el.querySelector('span').innerText;
                    el.innerHTML = `${parseFloat(val).toFixed(1)}<span>${unit}</span>`;
                }
            }
            mainChart.data.labels = json.feeds.map(f => new Date(f.created_at).toLocaleTimeString([], {hour: '2d', minute:'2d'}));
            mainChart.data.datasets[0].data = json.feeds.map(f => f.field1);
            mainChart.data.datasets[1].data = json.feeds.map(f => f.field2);
            mainChart.update();
        } catch (e) { console.warn("Waiting for telemetry..."); }
    }

    loadData();
</script>
</body>
</html>
