<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TerraConnect | Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-dark: #070b14;
            --accent: #d1b38b;
            --border: #2d3139;
            --card-bg: #0d1117;
            --text-light: #f4e9d8;
        }

        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        .a70-font { font-family: 'Cinzel', serif; letter-spacing: 2px; }

        .container { max-width: 1200px; margin: 0 auto; }
        
        /* HEADER & BIO */
        .header-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; margin-bottom: 20px; }
        .bio-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; text-align: center; }
        .animal-photo { width: 200px; height: 200px; border-radius: 50%; border: 3px solid var(--accent); object-fit: cover; margin-bottom: 15px; background: #1a1c20; }
        
        .info-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 25px; display: flex; flex-direction: column; justify-content: center; }
        .info-panel h1 { color: var(--accent); margin: 0 0 10px 0; font-size: 2rem; }
        .info-data { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 0.85rem; color: #9ca3af; }
        .info-data b { color: var(--accent); display: block; margin-bottom: 3px; }

        /* SENSOR CARDS */
        .sensor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .sensor-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; display: flex; align-items: center; justify-content: space-around; }
        .sensor-val { font-size: 3rem; font-weight: bold; color: var(--accent); }
        .sensor-val span { font-size: 1.2rem; margin-left: 5px; color: #9ca3af; }

        /* CHARTS */
        .chart-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px; height: 300px; }
        
        .btn-back { display: inline-block; padding: 10px 20px; background: transparent; border: 1px solid var(--accent); color: var(--accent); text-decoration: none; border-radius: 5px; margin-bottom: 20px; transition: 0.3s; }
        .btn-back:hover { background: var(--accent); color: var(--bg-dark); }
    </style>
</head>
<body>

<div class="container">
    <a href="maindashboard.html" class="btn-back a70-font"><i class="fas fa-arrow-left"></i> BACK TO DASHBOARD</a>

    <div class="header-grid">
        <div class="bio-card">
            <img id="dynPhoto" src="" alt="Animal Photo" class="animal-photo">
            <h2 id="dynName" class="a70-font" style="margin: 0;">---</h2>
        </div>
        <div class="info-panel">
            <h1 id="dynAmbient" class="a70-font">AMBIENT NAME</h1>
            <div class="info-data">
                <div><b>SCIENTIFIC NAME</b> <span id="dynScientific">---</span></div>
                <div><b>BIRTH DATE</b> <span id="dynBirth">---</span></div>
                <div><b>REGISTRATION</b> <span id="dynReg">---</span></div>
                <div><b>COORDINATES</b> <span id="dynLoc">---</span></div>
            </div>
        </div>
    </div>

    <div class="sensor-grid">
        <div class="sensor-card">
            <i class="fas fa-thermometer-half fa-3x" style="color: #ff5f5f;"></i>
            <div class="sensor-val" id="tempValue">--<span>°C</span></div>
        </div>
        <div class="sensor-card">
            <i class="fas fa-droplet fa-3x" style="color: #4da3ff;"></i>
            <div class="sensor-val" id="humValue">--<span>%</span></div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
   const urlParams = new URLSearchParams(window.location.search);
    const currentPageId = urlParams.get('id');
    // URL do seu CSV (Publicado na Web)
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTeBz5FwvcmPue3hJ6TKwmrNZeMrz2_Su7co-mPuzKj1ZJv--5BBvPjlszF3yyEHOVuEeGT9mmwZqOp/pub?gid=0&single=true&output=csv';
    
    let tsReadURL = "";
    let mainChart;

    async function loadData() {
        if (!currentPageId) return;

        try {
            const response = await fetch(CSV_URL);
            const csvData = await response.text();
            // Divide por linhas e depois por vírgulas, mas ignora vírgulas dentro de aspas (importante para o Base64)
            const rows = csvData.split('\n').map(row => row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || []);

            // Busca o registro pelo PageID (Coluna B - Index 1)
            const data = rows.find(r => r[1]?.replace(/"/g, '') === currentPageId);

            if (data) {
                // Mapeamento de Colunas (Baseado na estrutura J, K, L nova)
                document.getElementById('dynAmbientName').innerText = data[2].replace(/"/g, '').toUpperCase();
                document.getElementById('dynAnimalName').innerText = data[3].replace(/"/g, '');
                document.getElementById('dynScientific').innerText = data[4].replace(/"/g, '');
                document.getElementById('dynBirth').innerText = data[5].replace(/"/g, '');
                document.getElementById('dynReg').innerText = data[6].replace(/"/g, '');
                document.getElementById('dynLoc').innerText = `${data[7]}, ${data[8]}`.replace(/"/g, '');
                document.getElementById('dynChannel').innerText = data[9].replace(/"/g, '');
                document.getElementById('dynPhoto').src = data[12].replace(/"/g, ''); // Base64 na Coluna M (Index 12)

                // Monta a URL do ThingSpeak dinamicamente com Coluna J (9) e K (10)
                const channelID = data[9].replace(/"/g, '');
                const readKey = data[10].replace(/"/g, '');
                tsReadURL = `https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readKey}&results=20`;

                initChart();
                updateSensors();
                setInterval(updateSensors, 20000);
            }
        } catch (e) { console.error("Erro ao carregar banco de dados:", e); }
    }

    function initChart() {
        const ctx = document.getElementById('mainChart').getContext('2d');
        mainChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Temperatura (°C)', data: [], borderColor: '#d1b38b', tension: 0.4, yAxisID: 'y' },
                    { label: 'Umidade (%)', data: [], borderColor: '#4da3ff', tension: 0.4, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { type: 'linear', position: 'left', grid: { color: '#2d3139' }, ticks: { color: '#d1b38b' } },
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#4da3ff' } }
                },
                plugins: { legend: { labels: { color: '#f4e9d8', font: { family: 'Inter' } } } }
            }
        });
    }

    async function updateSensors() {
        if (!tsReadURL) return;
        try {
            const res = await fetch(tsReadURL);
            const json = await res.json();
            const last = json.feeds[json.feeds.length - 1];

            document.getElementById('tempValue').innerHTML = `${parseFloat(last.field1).toFixed(1)}<span>°C</span>`;
            document.getElementById('humValue').innerHTML = `${parseFloat(last.field2).toFixed(1)}<span>%</span>`;

            // Atualiza Gráfico
            mainChart.data.labels = json.feeds.map(f => new Date(f.created_at).toLocaleTimeString([], {hour: '2d', minute:'2d'}));
            mainChart.data.datasets[0].data = json.feeds.map(f => f.field1);
            mainChart.data.datasets[1].data = json.feeds.map(f => f.field2);
            mainChart.update();
        } catch (e) { console.warn("Falha ao ler ThingSpeak."); }
    }

    loadData();
</script>
</body>
</html>
